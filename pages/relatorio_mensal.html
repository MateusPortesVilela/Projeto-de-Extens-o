<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório Mensal | LojaVendas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">V</div>
        <div>
          <div class="logo-brand">LojaVendas</div>
          <div class="logo-sub">Sistema Varejo</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-label">Principal</span>
          <a href="../index.html" class="nav-item" data-page="index">
            <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
          </a>
          <a href="vendas.html" class="nav-item" data-page="vendas">
            <span class="nav-icon">🛒</span><span class="nav-label">Nova Venda</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-label">Cadastros</span>
          <a href="clientes.html" class="nav-item" data-page="clientes">
            <span class="nav-icon">👥</span><span class="nav-label">Clientes</span>
          </a>
          <a href="produtos.html" class="nav-item" data-page="produtos">
            <span class="nav-icon">📦</span><span class="nav-label">Produtos</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-label">Gestão</span>
          <a href="devolucoes.html" class="nav-item" data-page="devolucoes">
            <span class="nav-icon">↩️</span><span class="nav-label">Devoluções</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-label">Relatórios</span>
          <a href="relatorio_diario.html" class="nav-item" data-page="relatorio_diario">
            <span class="nav-icon">📋</span><span class="nav-label">Diário</span>
          </a>
          <a href="relatorio_mensal.html" class="nav-item active" data-page="relatorio_mensal">
            <span class="nav-icon">📊</span><span class="nav-label">Mensal</span>
          </a>
          <a href="relatorio_anual.html" class="nav-item" data-page="relatorio_anual">
            <span class="nav-icon">📈</span><span class="nav-label">Anual</span>
          </a>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebar-toggle">☰</button>
          <div>
            <h1 class="page-title">Relatório Mensal</h1>
            <div class="page-subtitle">Consolidado das vendas por mês</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="date-chip" id="current-date">...</div>
        </div>
      </header>

      <div class="page-content">
        <div id="alert-area"></div>

        <div class="filter-bar">
          <div class="form-group">
            <label class="form-label">Ano Referência</label>
            <input type="number" id="filter-ano" class="form-control" min="2000" max="2100">
          </div>
          <button id="btn-filtrar" class="btn btn-outline">Filtrar</button>
        </div>

        <div class="summary-row">
          <div class="summary-chip accent">
            <div class="s-label">Total Arrecadado</div>
            <div class="s-value" id="r-total-anual">R$ 0,00</div>
          </div>
          <div class="summary-chip">
            <div class="s-label">Ano Consolidado</div>
            <div class="s-value" id="r-ano-label">—</div>
          </div>
        </div>

        <div class="card">
          <div id="relatorio-content">
            <!-- Tabela injetada via JS -->
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../js/main.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initRelatorioMensal);</script>
</body>
</html>
