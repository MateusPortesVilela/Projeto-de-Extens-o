<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes | LojaVendas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">V</div>
        <div>
          <div class="logo-brand">LojaVendas</div>
          <div class="logo-sub">Sistema Varejo</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-label">Principal</span>
          <a href="../index.html" class="nav-item" data-page="index">
            <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
          </a>
          <a href="vendas.html" class="nav-item" data-page="vendas">
            <span class="nav-icon">🛒</span><span class="nav-label">Nova Venda</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-label">Cadastros</span>
          <a href="clientes.html" class="nav-item active" data-page="clientes">
            <span class="nav-icon">👥</span><span class="nav-label">Clientes</span>
          </a>
          <a href="produtos.html" class="nav-item" data-page="produtos">
            <span class="nav-icon">📦</span><span class="nav-label">Produtos</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-label">Gestão</span>
          <a href="devolucoes.html" class="nav-item" data-page="devolucoes">
            <span class="nav-icon">↩️</span><span class="nav-label">Devoluções</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-label">Relatórios</span>
          <a href="relatorio_diario.html" class="nav-item" data-page="relatorio_diario">
            <span class="nav-icon">📋</span><span class="nav-label">Diário</span>
          </a>
          <a href="relatorio_mensal.html" class="nav-item" data-page="relatorio_mensal">
            <span class="nav-icon">📊</span><span class="nav-label">Mensal</span>
          </a>
          <a href="relatorio_anual.html" class="nav-item" data-page="relatorio_anual">
            <span class="nav-icon">📈</span><span class="nav-label">Anual</span>
          </a>
        </div>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebar-toggle">☰</button>
          <div>
            <h1 class="page-title">Clientes</h1>
            <div class="page-subtitle">Gerenciamento de clientes</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="date-chip" id="current-date">...</div>
        </div>
      </header>

      <div class="page-content">
        <div id="alert-area"></div>

        <div class="grid-2">
          <!-- Novo Cliente -->
          <div class="card" style="align-self: start;">
            <div class="card-header">
              <h2 class="card-title">Novo Cliente</h2>
            </div>
            <form id="form-cliente">
              <div class="form-group">
                <label class="form-label">Nome Completo</label>
                <input type="text" id="nome-cliente" class="form-control" placeholder="Ex: Ana Paula Souza" required minlength="3">
              </div>
              <button type="submit" class="btn btn-primary btn-full">Salvar Cliente</button>
            </form>
          </div>

          <!-- Lista de Clientes -->
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">Clientes Cadastrados</h2>
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th width="80">#ID</th>
                    <th>Nome</th>
                  </tr>
                </thead>
                <tbody id="clientes-tbody">
                  <tr><td colspan="2" style="text-align:center;padding:20px;color:var(--text-muted)">Carregando...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/main.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initClientes);</script>
</body>
</html>
